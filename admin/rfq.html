<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RFQ Moderation – SHIAP Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-slate-50">
<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div class="w-64 bg-slate-900 flex flex-col flex-shrink-0">
    <div class="p-5 border-b border-slate-700">
      <a href="../index.html" class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div>
        <div><span class="text-lg font-extrabold text-white">SHIAP</span><span class="text-xs text-slate-400 ml-2 bg-slate-700 px-1.5 py-0.5 rounded">ADMIN</span></div>
      </a>
    </div>
    <div class="p-4 border-b border-slate-700">
      <div class="flex items-center gap-3">
        <div id="admin-user-avatar" class="w-9 h-9 rounded-full bg-blue-600 text-white font-bold text-sm flex items-center justify-center">AD</div>
        <div><div id="admin-user-name" class="text-sm font-semibold text-white">Admin</div><div id="admin-user-email" class="text-xs text-slate-400">admin@shiap.com</div></div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
        Dashboard
      </a>
      <a href="users.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        Manage Users
      </a>
      <a href="products.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        Manage Products
      </a>
      <a href="orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-slate-800 hover:text-white text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Orders & Escrow
      </a>
      <a href="rfq.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-600/20 text-blue-400 font-semibold text-sm border border-blue-600/30">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        RFQ Moderation
      </a>
      <div class="pt-3 border-t border-slate-700 mt-3">
        <a href="#" onclick="doLogout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-400 hover:bg-red-900/20 hover:text-red-400 text-sm font-medium">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Sign Out
        </a>
      </div>
    </nav>
  </div>

  <div class="flex-1 overflow-y-auto">
    <div class="bg-white border-b border-slate-100 px-8 py-4 sticky top-0 z-10">
      <h1 class="text-xl font-bold text-slate-900">RFQ Moderation</h1>
      <p class="text-xs text-slate-400">Review, approve, and match RFQs to verified suppliers</p>
    </div>
    <div class="p-8">
      <!-- Stats -->
      <div class="grid grid-cols-3 gap-5 mb-8">
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 text-center">
          <div id="rfq-stat-open" class="text-2xl font-extrabold text-amber-600">—</div>
          <div class="text-xs text-slate-400 mt-1">Open RFQs</div>
        </div>
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 text-center">
          <div id="rfq-stat-awarded" class="text-2xl font-extrabold text-emerald-600">—</div>
          <div class="text-xs text-slate-400 mt-1">Awarded / Closed</div>
        </div>
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 text-center">
          <div id="rfq-stat-total" class="text-2xl font-extrabold text-slate-900">—</div>
          <div class="text-xs text-slate-400 mt-1">Total RFQs</div>
        </div>
      </div>

      <h2 class="text-lg font-bold text-slate-900 mb-4 flex items-center gap-2">
        RFQ Queue
        <span id="rfq-queue-badge" class="bg-amber-100 text-amber-700 text-xs font-bold px-2.5 py-1 rounded-full">0 RFQs</span>
      </h2>

      <div id="rfq-cards-container" class="space-y-4">
        <div class="text-center py-12 text-slate-400">Loading RFQs...</div>
      </div>
    </div>
  </div>
</div>

<script>
  let allRfqs = [];

  function loadAdminUser() {
    let user = null;
    try { user = JSON.parse(localStorage.getItem('shiap_user')); } catch(e) {}
    if (!user || !user.email || user.role !== 'admin') { window.location.replace('../login.html'); return null; }
    const name = `${user.first_name || ''} ${user.last_name || ''}`.trim() || 'Admin';
    const initials = name.split(' ').map(w => w[0] || '').slice(0, 2).join('').toUpperCase() || 'AD';
    document.getElementById('admin-user-avatar').textContent = initials;
    document.getElementById('admin-user-name').textContent = name;
    document.getElementById('admin-user-email').textContent = user.email;
    return user;
  }

  function doLogout() { localStorage.removeItem('shiap_user'); window.location.replace('../login.html'); }

  async function approveRFQ(rfqId, btn) {
    btn.disabled = true;
    btn.textContent = 'Processing...';
    try {
      const res = await fetch(`/api/rfqs/${rfqId}/status`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'awarded' })
      });
      if (!res.ok) throw new Error();
      const rfq = allRfqs.find(r => r.id === rfqId);
      if (rfq) rfq.status = 'awarded';
      const card = btn.closest('.rfq-card');
      if (card) {
        card.style.opacity = '0.6';
        const badge = card.querySelector('.rfq-status-badge');
        if (badge) { badge.textContent = '✓ Distributed'; badge.className = 'rfq-status-badge text-xs bg-emerald-100 text-emerald-700 font-bold px-2 py-0.5 rounded-full'; }
        btn.textContent = '✓ Distributed to Suppliers';
        btn.className = 'flex-1 bg-emerald-600 cursor-not-allowed text-white font-semibold py-3 rounded-xl text-sm opacity-70';
        const rejectBtn = card.querySelector('button:last-child');
        if (rejectBtn) { rejectBtn.disabled = true; rejectBtn.style.opacity = '0.5'; }
      }
      const open = allRfqs.filter(r => r.status === 'open').length;
      const awarded = allRfqs.filter(r => r.status === 'awarded').length;
      document.getElementById('rfq-stat-open').textContent = open;
      document.getElementById('rfq-stat-awarded').textContent = awarded;
    } catch(e) {
      btn.disabled = false;
      btn.textContent = '✓ Approve & Distribute';
      alert('Failed to approve RFQ. Please try again.');
    }
  }

  async function rejectRFQ(rfqId, btn) {
    btn.disabled = true;
    btn.textContent = '...';
    try {
      const res = await fetch(`/api/rfqs/${rfqId}/status`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'rejected' })
      });
      if (!res.ok) throw new Error();
      const rfq = allRfqs.find(r => r.id === rfqId);
      if (rfq) rfq.status = 'rejected';
      const card = btn.closest('.rfq-card');
      if (card) {
        card.style.opacity = '0.5';
        const badge = card.querySelector('.rfq-status-badge');
        if (badge) { badge.textContent = '✗ Rejected'; badge.className = 'rfq-status-badge text-xs bg-red-100 text-red-700 font-bold px-2 py-0.5 rounded-full'; }
        Array.from(card.querySelectorAll('button')).forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
      }
      const open = allRfqs.filter(r => r.status === 'open').length;
      document.getElementById('rfq-stat-open').textContent = open;
    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Reject';
      alert('Failed to reject RFQ. Please try again.');
    }
  }

  function renderRfqs(rfqs) {
    const container = document.getElementById('rfq-cards-container');
    const badge = document.getElementById('rfq-queue-badge');
    badge.textContent = `${rfqs.length} RFQs`;

    if (!rfqs.length) {
      container.innerHTML = '<div class="bg-white rounded-2xl border border-slate-100 p-12 text-center"><div class="text-3xl mb-3">📋</div><div class="text-slate-400">No RFQs to review.</div></div>';
      return;
    }

    container.innerHTML = rfqs.map(r => {
      const date = new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      const statusBadgeCls = r.status === 'open'
        ? 'bg-amber-100 text-amber-700'
        : r.status === 'awarded' ? 'bg-emerald-100 text-emerald-700'
        : 'bg-slate-100 text-slate-600';
      const statusLabel = r.status === 'open' ? 'Open' : r.status === 'awarded' ? '✓ Awarded' : r.status;
      const borderCls = r.status === 'open' ? 'border-2 border-amber-200' : 'border border-slate-100';
      const buyer = r.buyer_company || r.user_email;
      const country = r.buyer_country || r.origin || '—';
      return `<div class="rfq-card bg-white rounded-2xl ${borderCls} shadow-sm p-6">
        <div class="flex items-start justify-between mb-4">
          <div>
            <div class="flex items-center gap-3 mb-2">
              <span class="text-sm font-mono text-blue-600">#RFQ-${String(r.id).padStart(4,'0')}</span>
              <span class="rfq-status-badge text-xs ${statusBadgeCls} font-bold px-2 py-0.5 rounded-full">${statusLabel}</span>
              <span class="text-xs text-slate-400">${date}</span>
            </div>
            <h3 class="text-base font-bold text-slate-900">${r.product_name}</h3>
            <div class="text-sm text-slate-500 mt-1">
              ${r.quantity ? `Qty: ${r.quantity}` : ''} ${r.target_price ? `· Target: ${r.target_price}` : ''}
            </div>
          </div>
        </div>
        <div class="grid md:grid-cols-3 gap-3 mb-4">
          <div class="bg-slate-50 rounded-xl p-3 text-xs">
            <div class="font-semibold text-slate-700 mb-1">Buyer</div>
            <div class="text-slate-600">${buyer}</div>
            <div class="text-slate-400">${country}</div>
          </div>
          <div class="bg-slate-50 rounded-xl p-3 text-xs md:col-span-2">
            <div class="font-semibold text-slate-700 mb-1">Description</div>
            <div class="text-slate-600">${r.description || '—'}</div>
          </div>
        </div>
        ${r.status === 'open' ? `<div class="flex gap-3">
          <button onclick="approveRFQ(${r.id},this)" class="flex-1 bg-blue-700 text-white font-semibold py-3 rounded-xl hover:bg-blue-800 text-sm">✓ Approve & Distribute</button>
          <button onclick="rejectRFQ(${r.id},this)" class="px-6 bg-red-50 text-red-600 border border-red-100 font-medium py-3 rounded-xl hover:bg-red-100 text-sm">Reject</button>
        </div>` : ''}
      </div>`;
    }).join('');
  }

  async function loadRfqs() {
    const user = loadAdminUser();
    if (!user) return;
    try {
      const res = await fetch('/api/rfqs');
      if (!res.ok) throw new Error();
      allRfqs = await res.json();
      const open = allRfqs.filter(r => r.status === 'open').length;
      const awarded = allRfqs.filter(r => r.status === 'awarded').length;
      document.getElementById('rfq-stat-open').textContent = open;
      document.getElementById('rfq-stat-awarded').textContent = awarded;
      document.getElementById('rfq-stat-total').textContent = allRfqs.length;
      renderRfqs(allRfqs);
    } catch(e) {
      document.getElementById('rfq-cards-container').innerHTML = '<div class="text-center py-8 text-red-500 text-sm">Unable to load RFQs.</div>';
    }
  }

  loadRfqs();
</script>
</body>
</html>
