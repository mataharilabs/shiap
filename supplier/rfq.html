<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RFQ Leads – SHIAP Supplier</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif;} .quote-form{display:none;}</style>
</head>
<body class="bg-slate-50">
<div class="flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <div class="w-64 bg-white border-r border-slate-100 shadow-sm flex flex-col flex-shrink-0">
    <div class="p-5 border-b border-slate-100"><a href="../index.html" class="flex items-center gap-2"><div class="w-8 h-8 rounded-lg bg-blue-700 flex items-center justify-center"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div><div><span class="text-lg font-extrabold text-slate-900">SHIAP</span><div class="text-[10px] text-slate-400 leading-none">by AsiaCommerce</div></div></a></div>
    <div class="p-4 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div id="supplier-avatar" class="w-9 h-9 rounded-full bg-emerald-100 text-emerald-700 font-bold text-sm flex items-center justify-center">S</div>
        <div><div id="supplier-name" class="text-sm font-semibold text-slate-900">Loading...</div><span class="text-xs bg-emerald-50 text-emerald-700 px-1.5 py-0.5 rounded-full font-medium">✓ Verified</span></div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 text-sm font-medium">Dashboard</a>
      <a href="products.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 text-sm font-medium">My Products</a>
      <a href="rfq.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-amber-50 text-amber-700 font-semibold text-sm">RFQ Leads <span id="rfq-lead-badge" class="ml-auto bg-amber-200 text-amber-800 text-xs font-bold px-2 py-0.5 rounded-full hidden">0</span></a>
      <a href="#" onclick="doLogout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-red-50 hover:text-red-600 text-sm font-medium">Sign Out</a>
    </nav>
  </div>

  <div class="flex-1 overflow-y-auto">
    <div class="bg-white border-b border-slate-100 px-8 py-4 sticky top-0 z-10">
      <h1 class="text-xl font-bold text-slate-900">RFQ Leads</h1>
      <p class="text-xs text-slate-400">Open RFQs distributed by admin. Submit quotes to win orders.</p>
    </div>
    <div class="p-8">
      <!-- Stats -->
      <div class="grid grid-cols-3 gap-5 mb-8">
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 text-center">
          <div id="stat-new" class="text-2xl font-extrabold text-amber-600">—</div>
          <div class="text-xs text-slate-400 mt-1">New Leads</div>
        </div>
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 text-center">
          <div id="stat-quoted" class="text-2xl font-extrabold text-blue-600">—</div>
          <div class="text-xs text-slate-400 mt-1">Quotes Submitted</div>
        </div>
        <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 text-center">
          <div id="stat-total" class="text-2xl font-extrabold text-slate-700">—</div>
          <div class="text-xs text-slate-400 mt-1">Total Open RFQs</div>
        </div>
      </div>

      <div id="rfq-leads-list" class="space-y-5">
        <div class="text-center py-12 text-slate-400 text-sm">Loading RFQ leads...</div>
      </div>
    </div>
  </div>
</div>

<script>
  let currentUser = null;
  let rfqLeads = [];

  function doLogout() { localStorage.removeItem('shiap_user'); window.location.replace('../login.html'); }
  function escHtml(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function initUser() {
    try { currentUser = JSON.parse(localStorage.getItem('shiap_user')); } catch(e) {}
    if (!currentUser || !currentUser.email || currentUser.role !== 'supplier') {
      window.location.replace('../login.html'); return false;
    }
    const name = `${currentUser.first_name || ''} ${currentUser.last_name || ''}`.trim() || currentUser.company_name || currentUser.email;
    const initials = name.split(' ').map(w => w[0]||'').slice(0,2).join('').toUpperCase() || 'S';
    document.getElementById('supplier-avatar').textContent = initials;
    document.getElementById('supplier-name').textContent = currentUser.company_name || name;
    return true;
  }

  function toggleQuoteForm(rfqId) {
    const form = document.getElementById(`qf-${rfqId}`);
    if (!form) return;
    const isHidden = form.style.display === 'none' || form.style.display === '';
    form.style.display = isHidden ? 'block' : 'none';
  }

  async function submitQuote(rfqId) {
    const unit_price = parseFloat(document.getElementById(`qf-price-${rfqId}`).value);
    const lead_time = parseInt(document.getElementById(`qf-lead-${rfqId}`).value);
    const shipping_terms = document.getElementById(`qf-ship-${rfqId}`).value;
    const payment_terms = document.getElementById(`qf-pay-${rfqId}`).value;
    const notes = document.getElementById(`qf-notes-${rfqId}`).value.trim();

    if (!unit_price || unit_price <= 0) { alert('Please enter a valid unit price.'); return; }

    const btn = document.getElementById(`qf-btn-${rfqId}`);
    btn.textContent = 'Submitting...'; btn.disabled = true;

    try {
      const res = await fetch('/api/rfq-quotes', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rfq_id: rfqId, supplier_email: currentUser.email, unit_price, lead_time, shipping_terms, payment_terms, notes })
      });
      if (!res.ok) throw new Error((await res.json()).error || 'Error');
      const lead = rfqLeads.find(r => r.id === rfqId);
      if (lead) { lead.my_quote_id = 1; lead.my_unit_price = unit_price; lead.my_lead_time = lead_time; }
      renderLeads();
    } catch(e) {
      alert('Failed to submit quote: ' + e.message);
      btn.textContent = 'Submit Quote'; btn.disabled = false;
    }
  }

  function renderLeadCard(r) {
    const date = new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const deadline = r.deadline ? `<span class="text-xs bg-amber-100 text-amber-700 font-bold px-2 py-0.5 rounded-full">Deadline: ${r.deadline}</span>` : '';
    const hasQuoted = !!r.my_quote_id;
    const targetVal = r.target_price && r.quantity
      ? `$${(parseFloat(r.target_price) * parseInt(r.quantity)).toLocaleString('en-US', {maximumFractionDigits:0})}`
      : r.target_price ? `$${r.target_price}/unit target` : '—';
    const buyer = r.buyer_company ? escHtml(r.buyer_company) : 'Anonymous Buyer';
    const country = r.buyer_country || r.origin || '—';

    const quotedSection = hasQuoted
      ? `<div class="bg-emerald-50 border border-emerald-200 rounded-xl p-4 mb-4">
          <div class="flex items-center justify-between">
            <div><span class="text-xs bg-emerald-100 text-emerald-700 font-bold px-2 py-0.5 rounded-full">✓ Quote Submitted</span>
            <div class="text-sm text-slate-700 mt-2">Your quote: <strong>$${parseFloat(r.my_unit_price).toFixed(2)}/unit</strong> · ${r.my_lead_time ? r.my_lead_time + ' days lead time' : ''}</div></div>
            <button onclick="toggleQuoteForm(${r.id})" class="text-xs text-blue-600 hover:underline">Edit Quote</button>
          </div>
        </div>`
      : '';

    const quoteForm = `<div id="qf-${r.id}" class="quote-form border border-slate-200 rounded-xl p-5 mb-4 bg-slate-50">
      <h4 class="font-semibold text-slate-900 mb-4 text-sm">${hasQuoted ? 'Update Your Quote' : 'Submit Your Quote'}</h4>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div><label class="text-xs text-slate-500 block mb-1">Unit Price (USD) *</label><input id="qf-price-${r.id}" type="number" step="0.01" placeholder="e.g., 13.50" value="${hasQuoted && r.my_unit_price ? r.my_unit_price : ''}" class="w-full px-3 py-2.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white" /></div>
        <div><label class="text-xs text-slate-500 block mb-1">Lead Time (days) *</label><input id="qf-lead-${r.id}" type="number" placeholder="e.g., 14" value="${hasQuoted && r.my_lead_time ? r.my_lead_time : ''}" class="w-full px-3 py-2.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 bg-white" /></div>
        <div><label class="text-xs text-slate-500 block mb-1">Shipping Terms</label><select id="qf-ship-${r.id}" class="w-full px-3 py-2.5 text-sm border border-slate-200 rounded-lg focus:outline-none bg-white"><option>FOB Origin Port</option><option>CIF Destination</option><option>EXW Factory</option><option>DAP Destination</option></select></div>
        <div><label class="text-xs text-slate-500 block mb-1">Payment Terms</label><select id="qf-pay-${r.id}" class="w-full px-3 py-2.5 text-sm border border-slate-200 rounded-lg focus:outline-none bg-white"><option>30% deposit, 70% BL</option><option>50% deposit, 50% delivery</option><option>L/C at sight</option><option>100% upfront</option></select></div>
      </div>
      <div class="mb-4"><label class="text-xs text-slate-500 block mb-1">Notes to Buyer</label><textarea id="qf-notes-${r.id}" rows="2" placeholder="Mention certifications, warranty, samples policy, packaging, etc." class="w-full px-3 py-2.5 text-sm border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none bg-white"></textarea></div>
      <div class="flex gap-3">
        <button id="qf-btn-${r.id}" onclick="submitQuote(${r.id})" class="flex-1 bg-emerald-600 text-white font-semibold py-2.5 rounded-xl hover:bg-emerald-700 text-sm">${hasQuoted ? 'Update Quote' : 'Submit Quote'}</button>
        <button onclick="toggleQuoteForm(${r.id})" class="border border-slate-200 text-slate-600 font-medium px-4 py-2.5 rounded-xl hover:bg-slate-50 text-sm">Cancel</button>
      </div>
    </div>`;

    const borderCls = hasQuoted ? 'border-emerald-200' : r.quote_count > 0 ? 'border-slate-200' : 'border-amber-200 border-2';

    return `<div class="bg-white rounded-2xl border ${borderCls} shadow-sm p-6">
      <div class="flex items-start justify-between mb-4">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <span class="text-sm font-mono text-blue-600">#RFQ-${String(r.id).padStart(4,'0')}</span>
            ${deadline}
            ${r.quote_count > 1 ? `<span class="text-xs text-slate-400">${r.quote_count} competitors</span>` : ''}
          </div>
          <h3 class="text-base font-bold text-slate-900">${escHtml(r.product_name)}</h3>
          <div class="text-sm text-slate-500 mt-1">
            ${r.quantity ? `Qty: ${r.quantity} ${r.unit||'units'}` : ''}
            ${r.category ? `· ${escHtml(r.category)}` : ''}
            ${r.origin ? `· Delivery: ${escHtml(r.origin)}` : ''}
          </div>
        </div>
        ${r.target_price ? `<div class="text-right"><div class="text-xs text-slate-400">Target Value</div><div class="text-xl font-extrabold text-slate-900">${targetVal}</div></div>` : ''}
      </div>
      ${r.description ? `<div class="bg-slate-50 rounded-xl p-4 mb-4 text-sm text-slate-600"><p class="font-medium text-slate-800 mb-1">Buyer Requirements:</p><p>${escHtml(r.description)}</p></div>` : ''}
      <div class="grid grid-cols-3 gap-3 mb-4">
        <div class="text-center text-xs bg-slate-50 rounded-xl p-3"><div class="text-slate-500 mb-1">Buyer</div><div class="font-bold text-slate-900">${buyer}</div><div class="text-slate-400">${escHtml(country)}</div></div>
        <div class="text-center text-xs bg-slate-50 rounded-xl p-3"><div class="text-slate-500 mb-1">Competitors</div><div class="font-bold text-slate-900">${r.quote_count > 0 ? r.quote_count + ' other quote' + (r.quote_count > 1 ? 's' : '') : 'First to quote!'}</div></div>
        <div class="text-center text-xs bg-slate-50 rounded-xl p-3"><div class="text-slate-500 mb-1">Posted</div><div class="font-bold text-slate-900">${date}</div></div>
      </div>
      ${quotedSection}
      ${quoteForm}
      ${!hasQuoted ? `<button onclick="toggleQuoteForm(${r.id})" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-semibold py-3 rounded-xl transition text-sm">Submit Quote for This RFQ</button>` : ''}
    </div>`;
  }

  function renderLeads() {
    const newLeads = rfqLeads.filter(r => !r.my_quote_id);
    const quoted = rfqLeads.filter(r => !!r.my_quote_id);
    document.getElementById('stat-new').textContent = newLeads.length;
    document.getElementById('stat-quoted').textContent = quoted.length;
    document.getElementById('stat-total').textContent = rfqLeads.length;
    const badge = document.getElementById('rfq-lead-badge');
    if (newLeads.length > 0) { badge.textContent = newLeads.length; badge.classList.remove('hidden'); } else { badge.classList.add('hidden'); }
    if (!rfqLeads.length) {
      document.getElementById('rfq-leads-list').innerHTML = '<div class="bg-white rounded-2xl border border-slate-100 p-12 text-center"><div class="text-3xl mb-3">📋</div><div class="text-slate-400">No open RFQ leads at the moment. Check back later.</div></div>';
      return;
    }
    document.getElementById('rfq-leads-list').innerHTML = rfqLeads.map(renderLeadCard).join('');
  }

  async function loadLeads() {
    try {
      const res = await fetch(`/api/rfqs/supplier?email=${encodeURIComponent(currentUser.email)}`);
      rfqLeads = await res.json();
      renderLeads();
    } catch(e) {
      document.getElementById('rfq-leads-list').innerHTML = '<div class="text-center py-8 text-red-500 text-sm">Unable to load RFQ leads.</div>';
    }
  }

  if (initUser()) loadLeads();
</script>
</body>
</html>
