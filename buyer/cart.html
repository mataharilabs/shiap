<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Cart – SHIAP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50">
<div class="flex h-screen overflow-hidden">

  <!-- Sidebar -->
  <div class="w-64 bg-white border-r border-slate-100 shadow-sm flex flex-col flex-shrink-0">
    <div class="p-5 border-b border-slate-100">
      <a href="../index.html" class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-blue-700 flex items-center justify-center"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div>
        <span class="text-lg font-extrabold text-slate-900">SHIAP</span>
      </a>
    </div>
    <div class="p-4 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div id="user-avatar" class="w-9 h-9 rounded-full bg-blue-100 text-blue-700 font-bold text-sm flex items-center justify-center">?</div>
        <div><div id="user-name" class="text-sm font-semibold text-slate-900">Loading...</div><div id="user-company-role" class="text-xs text-slate-400">—</div></div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/></svg>
        Dashboard
      </a>
      <a href="orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Order History
      </a>
      <a href="cart.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-semibold text-sm">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        My Cart
        <span id="nav-cart-count" class="ml-auto bg-blue-100 text-blue-700 text-xs font-bold px-2 py-0.5 rounded-full hidden">0</span>
      </a>
      <a href="../marketplace.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
        Browse Products
      </a>
      <a href="../rfq.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 text-sm font-medium">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        My RFQs
      </a>
      <div class="pt-3 border-t border-slate-100 mt-3">
        <a href="#" onclick="doLogout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-red-50 hover:text-red-600 text-sm font-medium">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Sign Out
        </a>
      </div>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="flex-1 overflow-y-auto">
    <div class="bg-white border-b border-slate-100 px-8 py-4 flex items-center justify-between sticky top-0 z-10">
      <div>
        <h1 class="text-xl font-bold text-slate-900">My Cart</h1>
        <p class="text-xs text-slate-400"><span id="cart-item-count">0</span> item(s) in your cart</p>
      </div>
      <a href="../marketplace.html" class="text-sm text-blue-600 font-medium hover:text-blue-800">← Continue Shopping</a>
    </div>

    <div class="p-8">
      <div class="max-w-4xl mx-auto">
        <!-- Cart Items -->
        <div id="cart-items-container" class="space-y-4 mb-8">
          <div class="text-center py-16 text-slate-400">
            <div class="text-4xl mb-3">🛒</div>
            <div class="text-sm">Loading cart...</div>
          </div>
        </div>

        <!-- Order Summary -->
        <div id="cart-summary" class="hidden">
          <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-6">
            <h2 class="font-bold text-slate-900 mb-4">Order Summary</h2>
            <div id="summary-items" class="space-y-2 mb-4 text-sm"></div>
            <div class="border-t border-slate-100 pt-4 flex items-center justify-between">
              <span class="font-bold text-slate-900">Grand Total</span>
              <span id="grand-total" class="text-xl font-extrabold text-blue-700">$0</span>
            </div>
            <a href="checkout.html" class="mt-5 w-full flex items-center justify-center gap-2 bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3.5 rounded-xl transition text-sm">
              Proceed to Checkout →
            </a>
            <p class="text-xs text-slate-400 text-center mt-3">🔒 Secure checkout with Escrow protection</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let cart = [];
  let currentUser = null;

  function readCart() {
    try { return JSON.parse(localStorage.getItem('shiap_cart')) || []; } catch(e) { return []; }
  }
  function saveCart(c) { localStorage.setItem('shiap_cart', JSON.stringify(c)); }

  function renderCart() {
    cart = readCart();
    const container = document.getElementById('cart-items-container');
    const summaryDiv = document.getElementById('cart-summary');
    const countEl = document.getElementById('cart-item-count');
    const badge = document.getElementById('nav-cart-count');

    countEl.textContent = cart.length;
    if (badge) { badge.textContent = cart.length; badge.classList.toggle('hidden', cart.length === 0); }

    if (!cart.length) {
      container.innerHTML = `<div class="text-center py-20">
        <div class="text-5xl mb-4">🛒</div>
        <div class="text-lg font-semibold text-slate-700 mb-2">Your cart is empty</div>
        <p class="text-sm text-slate-400 mb-6">Browse our marketplace to find quality products from verified suppliers.</p>
        <a href="../marketplace.html" class="inline-flex items-center gap-2 bg-blue-700 hover:bg-blue-800 text-white font-semibold px-6 py-3 rounded-xl transition text-sm">
          Browse Marketplace →
        </a>
      </div>`;
      summaryDiv.classList.add('hidden');
      return;
    }

    container.innerHTML = cart.map((item, idx) => {
      const subtotal = item.quantity * item.unit_price;
      return `<div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 flex items-center gap-5">
        <div class="w-14 h-14 bg-blue-50 rounded-xl flex items-center justify-center text-3xl flex-shrink-0">${item.image_emoji || '📦'}</div>
        <div class="flex-1 min-w-0">
          <div class="font-semibold text-slate-900 truncate">${item.product_name}</div>
          <div class="text-xs text-slate-400 mt-0.5">${item.supplier_name}${item.supplier_country ? ' · ' + item.supplier_country : ''}</div>
          <div class="text-xs text-slate-400 mt-0.5">$${item.unit_price}/unit · MOQ: ${item.moq} units</div>
        </div>
        <div class="flex items-center gap-1 flex-shrink-0">
          <button onclick="changeItemQty(${item.product_id}, -${item.moq})" class="w-8 h-8 flex items-center justify-center border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50 font-bold">−</button>
          <input type="number" value="${item.quantity}" min="${item.moq}" step="${item.moq}"
            onchange="setItemQty(${item.product_id}, this.value)"
            class="w-20 text-center text-sm border border-slate-200 rounded-lg py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500" />
          <button onclick="changeItemQty(${item.product_id}, ${item.moq})" class="w-8 h-8 flex items-center justify-center border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-50 font-bold">+</button>
        </div>
        <div class="text-right w-28 flex-shrink-0">
          <div class="font-bold text-blue-700 text-base">$${subtotal.toLocaleString()}</div>
          <div class="text-xs text-slate-400">${Number(item.quantity).toLocaleString()} units</div>
        </div>
        <button onclick="removeItem(${item.product_id})" class="w-8 h-8 flex items-center justify-center text-slate-300 hover:text-red-500 transition rounded-lg hover:bg-red-50 flex-shrink-0" title="Remove">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>`;
    }).join('');

    // Summary
    const grand = cart.reduce((sum, i) => sum + i.quantity * i.unit_price, 0);
    document.getElementById('summary-items').innerHTML = cart.map(i =>
      `<div class="flex items-center justify-between text-slate-600">
        <span class="truncate flex-1 mr-2">${i.image_emoji || '📦'} ${i.product_name}</span>
        <span class="flex-shrink-0 font-medium">$${(i.quantity * i.unit_price).toLocaleString()}</span>
      </div>`
    ).join('');
    document.getElementById('grand-total').textContent = '$' + grand.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    summaryDiv.classList.remove('hidden');
  }

  function changeItemQty(productId, delta) {
    cart = readCart();
    const item = cart.find(i => i.product_id === productId);
    if (!item) return;
    const newQty = item.quantity + delta;
    if (newQty < item.moq) return;
    item.quantity = newQty;
    saveCart(cart);
    renderCart();
  }

  function setItemQty(productId, value) {
    cart = readCart();
    const item = cart.find(i => i.product_id === productId);
    if (!item) return;
    const newQty = parseInt(value);
    if (!newQty || newQty < item.moq) {
      renderCart();
      return;
    }
    item.quantity = newQty;
    saveCart(cart);
    renderCart();
  }

  function removeItem(productId) {
    cart = readCart().filter(i => i.product_id !== productId);
    saveCart(cart);
    renderCart();
  }

  function renderUser(user) {
    const name = `${user.first_name || ''} ${user.last_name || ''}`.trim() || user.email;
    const initials = name.split(' ').map(w => w[0] || '').slice(0, 2).join('').toUpperCase() || user.email[0].toUpperCase();
    document.getElementById('user-avatar').textContent = initials;
    document.getElementById('user-name').textContent = name;
    document.getElementById('user-company-role').textContent = `${user.company_name || 'No company'} · Buyer`;
  }

  async function init() {
    let user = null;
    try { user = JSON.parse(localStorage.getItem('shiap_user')); } catch(e) {}
    if (!user || !user.email || user.role !== 'buyer') { window.location.replace('../login.html'); return; }
    currentUser = user;
    try {
      const res = await fetch(`/api/user?email=${encodeURIComponent(user.email)}`);
      if (res.ok) { const data = await res.json(); currentUser = data; localStorage.setItem('shiap_user', JSON.stringify(data)); }
    } catch(e) {}
    renderUser(currentUser);
    renderCart();
  }

  function doLogout() {
    localStorage.removeItem('shiap_user');
    window.location.replace('../login.html');
  }

  init();
</script>
</body>
</html>
