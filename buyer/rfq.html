<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My RFQs – SHIAP Buyer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>body{font-family:'Inter',sans-serif;}</style>
</head>
<body class="bg-slate-50">
<div class="flex h-screen overflow-hidden">
  <!-- Sidebar -->
  <div class="w-64 bg-white border-r border-slate-100 shadow-sm flex flex-col flex-shrink-0">
    <div class="p-5 border-b border-slate-100"><a href="../index.html" class="flex items-center gap-2"><div class="w-8 h-8 rounded-lg bg-blue-700 flex items-center justify-center"><svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg></div><div><span class="text-lg font-extrabold text-slate-900">SHIAP</span><div class="text-[10px] text-slate-400 leading-none">by AsiaCommerce</div></div></a></div>
    <div class="p-4 border-b border-slate-100">
      <div class="flex items-center gap-3">
        <div id="user-avatar" class="w-9 h-9 rounded-full bg-blue-100 text-blue-700 font-bold text-sm flex items-center justify-center">?</div>
        <div><div id="user-name" class="text-sm font-semibold text-slate-900">Loading...</div><div id="user-company-role" class="text-xs text-slate-400">—</div></div>
      </div>
    </div>
    <nav class="flex-1 p-3 space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 text-sm font-medium">Dashboard</a>
      <a href="orders.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 text-sm font-medium">Order History</a>
      <a href="rfq.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl bg-blue-50 text-blue-700 font-semibold text-sm">My RFQs <span id="rfq-badge" class="ml-auto bg-amber-100 text-amber-700 text-xs font-bold px-2 py-0.5 rounded-full hidden">0</span></a>
      <a href="../marketplace.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 text-sm font-medium">Browse Products</a>
      <a href="../sourcing.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-slate-50 text-sm font-medium">1688 Sourcing</a>
      <div class="pt-3 border-t border-slate-100 mt-3"><a href="#" onclick="logout()" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-slate-600 hover:bg-red-50 hover:text-red-600 text-sm font-medium">Sign Out</a></div>
    </nav>
  </div>

  <div class="flex-1 overflow-y-auto">
    <div class="bg-white border-b border-slate-100 px-8 py-4 flex items-center justify-between sticky top-0 z-10">
      <div>
        <h1 class="text-xl font-bold text-slate-900">My RFQs</h1>
        <p id="rfq-header-summary" class="text-xs text-slate-400">Loading...</p>
      </div>
      <a href="../rfq.html" class="flex items-center gap-2 bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold px-4 py-2.5 rounded-xl transition">+ New RFQ</a>
    </div>

    <div id="rfq-list" class="p-8 space-y-5">
      <div class="text-center py-12 text-slate-400 text-sm">Loading your RFQs...</div>
    </div>
  </div>
</div>

<!-- Compare Quotes Modal -->
<div id="compare-modal" class="fixed inset-0 bg-black/50 z-50 items-center justify-center p-4" style="display:none">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl max-h-[90vh] overflow-y-auto">
    <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white">
      <div>
        <h3 class="text-lg font-bold text-slate-900">Compare Quotes</h3>
        <p id="modal-rfq-title" class="text-xs text-slate-400 mt-0.5"></p>
      </div>
      <button onclick="closeCompare()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-100 text-slate-400 text-lg">✕</button>
    </div>
    <div id="compare-content" class="p-6">
      <div class="text-center py-8 text-slate-400 text-sm">Loading quotes...</div>
    </div>
  </div>
</div>

<script>
  let currentUser = null;
  let myRfqs = [];

  function logout() { localStorage.removeItem('shiap_user'); window.location.replace('../login.html'); }
  function escHtml(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function initUser() {
    try { currentUser = JSON.parse(localStorage.getItem('shiap_user')); } catch(e) {}
    if (!currentUser || !currentUser.email || currentUser.role !== 'buyer') {
      window.location.replace('../login.html'); return false;
    }
    const name = `${currentUser.first_name || ''} ${currentUser.last_name || ''}`.trim() || currentUser.email;
    const initials = name.split(' ').map(w => w[0]||'').slice(0,2).join('').toUpperCase() || '?';
    document.getElementById('user-avatar').textContent = initials;
    document.getElementById('user-name').textContent = name;
    document.getElementById('user-company-role').textContent = `${currentUser.company_name || ''} · Buyer`;
    return true;
  }

  function rfqStatusBadge(status, quoteCount) {
    if (status === 'pending') return '<span class="text-xs bg-amber-50 text-amber-700 font-bold px-2 py-0.5 rounded-full">⏳ Pending Review</span>';
    if (status === 'open' && quoteCount > 0) return `<span class="text-xs bg-emerald-100 text-emerald-700 font-bold px-2 py-0.5 rounded-full">✓ ${quoteCount} Quote${quoteCount>1?'s':''} Ready</span>`;
    if (status === 'open') return '<span class="text-xs bg-blue-50 text-blue-700 font-bold px-2 py-0.5 rounded-full">📤 Sent to Suppliers</span>';
    if (status === 'awarded') return '<span class="text-xs bg-blue-100 text-blue-700 font-bold px-2 py-0.5 rounded-full">✓ Awarded & Ordered</span>';
    if (status === 'rejected') return '<span class="text-xs bg-red-50 text-red-600 font-bold px-2 py-0.5 rounded-full">✗ Rejected</span>';
    return `<span class="text-xs bg-slate-100 text-slate-500 font-bold px-2 py-0.5 rounded-full">${status}</span>`;
  }

  function renderRfqCard(r) {
    const date = new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    const hasQuotes = r.quote_count > 0;
    const isAwarded = r.status === 'awarded';
    const borderCls = hasQuotes && !isAwarded ? 'border-2 border-emerald-200' : 'border border-slate-100';
    const opacityCls = isAwarded ? 'opacity-70' : '';
    const qtyText = r.quantity ? `${r.quantity} ${r.unit || 'units'}` : '—';
    const bestPriceHtml = r.best_price
      ? `<div class="text-right"><div class="text-sm text-slate-500">${isAwarded ? 'Awarded at:' : hasQuotes ? 'Best offer:' : ''}</div><div class="text-xl font-extrabold ${isAwarded ? 'text-slate-900' : 'text-emerald-600'}">$${parseFloat(r.best_price).toFixed(2)}/unit</div>${!isAwarded ? `<div class="text-xs text-slate-400">Total: $${(r.best_price * parseInt(r.quantity||1)).toLocaleString('en-US',{maximumFractionDigits:0})}</div>` : ''}</div>`
      : '';

    const tip = r.status === 'open' && !hasQuotes
      ? `<div class="bg-slate-50 rounded-xl p-3 mb-4 text-xs text-slate-600">💡 Your RFQ has been distributed to suppliers. Quotes typically arrive within 24–48 hours.</div>`
      : r.status === 'pending'
      ? `<div class="bg-amber-50 rounded-xl p-3 mb-4 text-xs text-amber-700">⏳ Your RFQ is awaiting review by our team. It will be distributed to suppliers shortly.</div>`
      : '';

    const actions = isAwarded
      ? `<a href="orders.html" class="inline-block text-sm text-blue-600 font-medium hover:text-blue-800">View Orders →</a>`
      : hasQuotes
      ? `<div class="flex gap-3">
          <button onclick="openCompare(${r.id},'${escHtml(r.product_name)}')" class="flex-1 bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 rounded-xl transition text-sm">Compare All ${r.quote_count} Quote${r.quote_count>1?'s':''} →</button>
         </div>`
      : `<div class="flex gap-3">
          <button class="flex-1 border border-slate-200 text-slate-400 font-medium py-3 rounded-xl text-sm cursor-default">Awaiting Quotes</button>
         </div>`;

    return `<div class="bg-white rounded-2xl ${borderCls} shadow-sm p-6 ${opacityCls}">
      <div class="flex items-start justify-between mb-4">
        <div>
          <div class="flex items-center gap-3 mb-2">
            <span class="text-sm font-mono text-blue-600">#RFQ-${String(r.id).padStart(4,'0')}</span>
            ${rfqStatusBadge(r.status, r.quote_count)}
          </div>
          <h3 class="text-base font-bold text-slate-900">${escHtml(r.product_name)}</h3>
          <div class="flex items-center gap-4 text-xs text-slate-500 mt-1">
            <span>${qtyText}</span>${r.category ? `<span>·</span><span>${escHtml(r.category)}</span>` : ''}
            <span>·</span><span>Submitted ${date}</span>
          </div>
        </div>
        ${bestPriceHtml}
      </div>
      ${tip}
      ${actions}
    </div>`;
  }

  async function loadRfqs() {
    try {
      const res = await fetch(`/api/rfqs/buyer?email=${encodeURIComponent(currentUser.email)}`);
      myRfqs = await res.json();
      const openCount = myRfqs.filter(r => r.status === 'open' || r.status === 'pending').length;
      const quotesReady = myRfqs.filter(r => r.quote_count > 0 && r.status === 'open').length;
      document.getElementById('rfq-header-summary').textContent = `${myRfqs.length} total · ${quotesReady} with quotes ready`;
      if (openCount > 0) {
        const badge = document.getElementById('rfq-badge');
        badge.textContent = openCount; badge.classList.remove('hidden');
      }
      if (!myRfqs.length) {
        document.getElementById('rfq-list').innerHTML = '<div class="text-center py-12"><div class="text-3xl mb-3">📋</div><p class="text-slate-400 mb-4">You have no RFQs yet.</p><a href="../rfq.html" class="bg-blue-700 text-white px-5 py-2.5 rounded-xl text-sm font-semibold hover:bg-blue-800">Create Your First RFQ</a></div>';
        return;
      }
      document.getElementById('rfq-list').innerHTML = myRfqs.map(renderRfqCard).join('');
    } catch(e) {
      document.getElementById('rfq-list').innerHTML = '<div class="text-center py-8 text-red-500 text-sm">Unable to load RFQs.</div>';
    }
  }

  async function openCompare(rfqId, productName) {
    document.getElementById('modal-rfq-title').textContent = `#RFQ-${String(rfqId).padStart(4,'0')} · ${productName}`;
    document.getElementById('compare-content').innerHTML = '<div class="text-center py-8 text-slate-400 text-sm">Loading quotes...</div>';
    document.getElementById('compare-modal').style.display = 'flex';
    try {
      const res = await fetch(`/api/rfq-quotes?rfq_id=${rfqId}`);
      const quotes = await res.json();
      if (!quotes.length) {
        document.getElementById('compare-content').innerHTML = '<div class="text-center py-8 text-slate-400">No quotes available yet.</div>';
        return;
      }
      const rfq = myRfqs.find(r => r.id === rfqId);
      const qty = rfq ? parseInt(rfq.quantity) || 1 : 1;
      const bestPrice = quotes[0].unit_price;

      const cols = quotes.map((q, i) => {
        const isBest = q.unit_price === bestPrice;
        const name = q.supplier_name || q.supplier_email;
        const total = (q.unit_price * qty).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        return `<div class="bg-white rounded-2xl ${isBest ? 'border-2 border-blue-500 shadow-lg' : 'border border-slate-100 shadow-sm mt-14'} p-5 relative">
          ${isBest ? '<div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-blue-700 text-white text-xs font-bold px-3 py-1 rounded-full">🏆 Best Price</div>' : ''}
          <div class="text-center mb-5 ${isBest ? 'pt-2' : ''}">
            <div class="w-10 h-10 bg-${isBest?'blue':'slate'}-100 rounded-full flex items-center justify-center text-lg mx-auto mb-2">🏭</div>
            <div class="font-bold text-slate-900 text-sm">${escHtml(name)}</div>
            <div class="text-xs text-slate-400">${escHtml(q.supplier_country || '—')}</div>
          </div>
          <div class="space-y-[14px] text-sm">
            <div class="h-8 flex items-center font-bold ${isBest?'text-emerald-600':'text-slate-900'} text-base">$${parseFloat(q.unit_price).toFixed(2)}</div>
            <div class="h-8 flex items-center font-bold text-slate-900">$${total}</div>
            <div class="h-8 flex items-center text-slate-700">${q.lead_time ? q.lead_time + ' days' : '—'}</div>
            <div class="h-8 flex items-center text-slate-700">${escHtml(q.shipping_terms || '—')}</div>
            <div class="h-8 flex items-center text-slate-700">${escHtml(q.payment_terms || '—')}</div>
          </div>
          ${q.notes ? `<div class="mt-3 text-xs text-slate-500 bg-slate-50 rounded-lg p-2">${escHtml(q.notes)}</div>` : ''}
          <button onclick="awardQuote(${rfqId},${q.id},'${escHtml(name)}')" class="w-full mt-4 ${isBest ? 'bg-blue-700 hover:bg-blue-800 text-white' : 'border border-slate-200 text-slate-600 hover:border-blue-400 hover:text-blue-700'} font-semibold py-3 rounded-xl transition text-sm">Award This Quote</button>
        </div>`;
      }).join('');

      document.getElementById('compare-content').innerHTML = `
        <div class="overflow-x-auto">
          <div class="grid gap-4" style="grid-template-columns: 130px repeat(${quotes.length}, minmax(180px, 1fr));">
            <div class="bg-white rounded-2xl border border-slate-100 shadow-sm p-5 mt-14">
              <div class="space-y-[22px] pt-1 text-sm text-slate-500 font-medium">
                <div class="h-8 flex items-center">Unit Price</div>
                <div class="h-8 flex items-center">Total (${qty} units)</div>
                <div class="h-8 flex items-center">Lead Time</div>
                <div class="h-8 flex items-center">Shipping</div>
                <div class="h-8 flex items-center">Payment</div>
              </div>
            </div>
            ${cols}
          </div>
        </div>`;
    } catch(e) {
      document.getElementById('compare-content').innerHTML = '<div class="text-center py-8 text-red-500 text-sm">Unable to load quotes.</div>';
    }
  }

  function closeCompare() { document.getElementById('compare-modal').style.display = 'none'; }

  async function awardQuote(rfqId, quoteId, supplierName) {
    if (!confirm(`Award this RFQ to ${supplierName}? The supplier will be notified.`)) return;
    try {
      const res = await fetch(`/api/rfqs/${rfqId}/status`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'awarded' })
      });
      if (!res.ok) throw new Error();
      closeCompare();
      alert(`RFQ awarded to ${supplierName}! The supplier will be contacted to begin production.`);
      await loadRfqs();
    } catch(e) {
      alert('Failed to award quote. Please try again.');
    }
  }

  if (initUser()) loadRfqs();
</script>
</body>
</html>
